<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniVoice 语音克隆服务</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .card h2 {
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        .form-group input[type="text"],
        .form-group input[type="number"],
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .file-input-wrapper {
            position: relative;
        }

        .file-input-wrapper input[type="file"] {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .file-input-label {
            display: block;
            padding: 40px;
            border: 2px dashed #ccc;
            border-radius: 8px;
            text-align: center;
            color: #888;
            background: #fafafa;
            transition: all 0.3s;
        }

        .file-input-wrapper:hover .file-input-label {
            border-color: #667eea;
            background: #f0f0ff;
        }

        .file-input-label.has-file {
            border-color: #667eea;
            background: #e8e8ff;
            color: #667eea;
        }

        .btn {
            padding: 14px 32px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .voice-list, .output-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .voice-item, .output-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .voice-item:hover, .output-item:hover {
            background: #f0f0ff;
        }

        .voice-name {
            font-weight: 600;
            color: #333;
        }

        .voice-time, .output-time {
            color: #888;
            font-size: 14px;
        }

        .output-filename {
            color: #333;
            font-weight: 500;
        }

        .output-size {
            color: #888;
            font-size: 14px;
        }

        .empty-message {
            text-align: center;
            color: #888;
            padding: 30px;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 16px 24px;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s;
            z-index: 1000;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        .toast.success {
            background: #4caf50;
        }

        .toast.error {
            background: #f44336;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #ffffff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }
        }

        .audio-player {
            width: 100%;
            margin-top: 10px;
        }

        .use-voice-btn {
            padding: 6px 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .use-voice-btn:hover {
            background: #764ba2;
        }

        .play-btn {
            padding: 8px 16px;
            background: #4caf50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .play-btn:hover {
            background: #45a049;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>OmniVoice 语音克隆服务</h1>

        <div class="grid-2">
            <!-- 音色克隆 -->
            <div class="card">
                <h2>🎙️ 音色克隆</h2>
                <form id="cloneForm">
                    <div class="form-group">
                        <label>音色名称</label>
                        <input type="text" id="voiceName" placeholder="输入音色名称，如：yundi" required>
                    </div>
                    <div class="form-group">
                        <label>参考音频</label>
                        <div class="file-input-wrapper">
                            <input type="file" id="refAudio" accept="audio/*" required>
                            <div class="file-input-label" id="refAudioLabel">
                                点击上传音频文件（支持 mp3, wav, m4a 等）
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>参考音频文本（可选）</label>
                        <input type="text" id="refText" placeholder="如果不填，将自动转录">
                    </div>
                    <button type="submit" class="btn btn-primary" id="cloneBtn">
                        开始克隆
                    </button>
                </form>
            </div>

            <!-- 语音合成 -->
            <div class="card">
                <h2>🔊 语音合成</h2>
                <form id="synthForm">
                    <div class="form-group">
                        <label>选择音色</label>
                        <select id="synthVoiceId" required>
                            <option value="">-- 请先克隆音色 --</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>要合成的文本</label>
                        <textarea id="synthText" placeholder="输入要合成的文本内容" required></textarea>
                    </div>
                    <div class="form-group">
                        <label>语言</label>
                        <select id="synthLanguage">
                            <option value="Chinese">中文</option>
                            <option value="English">英文</option>
                            <option value="Japanese">日语</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>语速 (0.5 - 2.0)</label>
                        <input type="number" id="synthSpeed" value="1.0" min="0.5" max="2.0" step="0.1">
                    </div>
                    <button type="submit" class="btn btn-primary" id="synthBtn">
                        开始合成
                    </button>
                </form>
            </div>
        </div>

        <!-- 音色列表 -->
        <div class="card">
            <h2>📋 音色列表</h2>
            <div class="voice-list" id="voiceList">
                <div class="empty-message">暂无音色，请先克隆</div>
            </div>
        </div>

        <!-- 合成历史 -->
        <div class="card">
            <h2>📁 合成历史</h2>
            <div class="output-list" id="outputList">
                <div class="empty-message">暂无合成记录</div>
            </div>
        </div>
    </div>

    <!-- Toast 通知 -->
    <div class="toast" id="toast"></div>

    <script>
        // ============ 工具函数 ============
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => {
                toast.className = 'toast';
            }, 3000);
        }

        function setLoading(btn, loading) {
            if (loading) {
                btn.disabled = true;
                btn.innerHTML = '<span class="loading"></span>处理中...';
            } else {
                btn.disabled = false;
                btn.textContent = btn.dataset.originalText;
            }
        }

        // ============ 音色克隆 ============
        document.getElementById('cloneForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('cloneBtn');
            btn.dataset.originalText = btn.textContent;
            setLoading(btn, true);

            const voiceName = document.getElementById('voiceName').value;
            const refAudio = document.getElementById('refAudio').files[0];
            const refText = document.getElementById('refText').value || null;

            if (!refAudio) {
                showToast('请选择参考音频', 'error');
                setLoading(btn, false);
                return;
            }

            try {
                const formData = new FormData();
                formData.append('voice_name', voiceName);
                formData.append('ref_audio', refAudio);
                formData.append('ref_text', refText);

                const response = await fetch('/api/voice/clone', {
                    method: 'POST',
                    body: formData,
                });

                const result = await response.json();

                if (result.success) {
                    showToast('音色克隆成功！');
                    loadVoices();
                    document.getElementById('cloneForm').reset();
                    document.getElementById('refAudioLabel').className = 'file-input-label';
                    document.getElementById('refAudioLabel').textContent = '点击上传音频文件（支持 mp3, wav, m4a 等）';
                } else {
                    showToast(result.message || '克隆失败', 'error');
                }
            } catch (error) {
                showToast('克隆失败: ' + error.message, 'error');
            }

            setLoading(btn, false);
        });

        // 文件选择显示
        document.getElementById('refAudio').addEventListener('change', (e) => {
            const label = document.getElementById('refAudioLabel');
            if (e.target.files.length > 0) {
                label.textContent = '已选择: ' + e.target.files[0].name;
                label.className = 'file-input-label has-file';
            } else {
                label.textContent = '点击上传音频文件（支持 mp3, wav, m4a 等）';
                label.className = 'file-input-label';
            }
        });

        // ============ 语音合成 ============
        document.getElementById('synthForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('synthBtn');
            btn.dataset.originalText = btn.textContent;
            setLoading(btn, true);

            const voiceId = document.getElementById('synthVoiceId').value;
            const text = document.getElementById('synthText').value;
            const language = document.getElementById('synthLanguage').value;
            const speed = parseFloat(document.getElementById('synthSpeed').value);

            try {
                const formData = new FormData();
                formData.append('text', text);
                formData.append('voice_id', voiceId);
                formData.append('language', language);
                formData.append('speed', speed);

                const response = await fetch('/api/synthesize', {
                    method: 'POST',
                    body: formData,
                });

                const result = await response.json();

                if (result.success) {
                    showToast('语音合成成功！');
                    loadOutputs();
                } else {
                    showToast(result.message || '合成失败', 'error');
                }
            } catch (error) {
                showToast('合成失败: ' + error.message, 'error');
            }

            setLoading(btn, false);
        });

        // ============ 加载音色列表 ============
        async function loadVoices() {
            try {
                const response = await fetch('/api/voice/list');
                const result = await response.json();

                const voiceList = document.getElementById('voiceList');
                const synthVoice = document.getElementById('synthVoiceId');

                if (result.voices && result.voices.length > 0) {
                    voiceList.innerHTML = result.voices.map(voice => `
                        <div class="voice-item">
                            <div>
                                <div class="voice-name">${voice.voice_name}</div>
                                <div class="voice-time">创建时间: ${voice.created_time}</div>
                            </div>
                            <button class="use-voice-btn" onclick="useVoice('${voice.voice_id}')">使用</button>
                        </div>
                    `).join('');

                    synthVoice.innerHTML = '<option value="">-- 选择音色 --</option>' +
                        result.voices.map(v => `<option value="${v.voice_id}">${v.voice_name}</option>`).join('');
                } else {
                    voiceList.innerHTML = '<div class="empty-message">暂无音色，请先克隆</div>';
                }
            } catch (error) {
                console.error('加载音色列表失败:', error);
            }
        }

        // ============ 加载输出列表 ============
        async function loadOutputs() {
            try {
                const response = await fetch('/api/output/list');
                const result = await response.json();

                const outputList = document.getElementById('outputList');

                if (result.outputs && result.outputs.length > 0) {
                    outputList.innerHTML = result.outputs.map(output => `
                        <div class="output-item">
                            <div>
                                <div class="output-filename">${output.filename}</div>
                                <div class="output-time">${output.created_time}</div>
                                <div class="output-size">${(output.size / 1024).toFixed(1)} KB</div>
                            </div>
                            <button class="play-btn" onclick="playAudio('${output.filename}')">播放</button>
                        </div>
                    `).join('');
                } else {
                    outputList.innerHTML = '<div class="empty-message">暂无合成记录</div>';
                }
            } catch (error) {
                console.error('加载输出列表失败:', error);
            }
        }

        function useVoice(voiceId) {
            document.getElementById('synthVoiceId').value = voiceId;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function playAudio(filename) {
            const audio = new Audio(`/api/output/${filename}`);
            audio.play();
        }

        // ============ 初始化 ============
        loadVoices();
        loadOutputs();

        // 每10秒刷新列表
        setInterval(() => {
            loadVoices();
            loadOutputs();
        }, 10000);
    </script>
</body>
</html>
